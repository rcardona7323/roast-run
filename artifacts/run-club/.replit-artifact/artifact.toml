kind = "web"
previewPath = "/"
title = "Café Run Club Rewards"
version = "1.0.0"
id = "artifacts/run-club"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25271

[services.development]
run = "pnpm --filter @workspace/run-club run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/run-club", "run", "build" ]
publicDir = "artifacts/run-club/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25271"
BASE_PATH = "/"
