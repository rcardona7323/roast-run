          type: string
        displayName:
          type: string
        profileImageUrl:
          type: ["string", "null"]
        totalMiles:
          type: number
        runCount:
          type: integer

    MemberDetail:
      type: object
      required: [member, runs, earnedTiers]
      properties:
        member:
          $ref: '#/components/schemas/Member'
        runs:
          type: array
          items:
            $ref: '#/components/schemas/Run'
        earnedTiers:
          type: array
          items:
            $ref: '#/components/schemas/RewardTier'
        nextTier:
          oneOf:
            - $ref: '#/components/schemas/RewardTier'
            - type: 'null'
        milesUntilNext:
          type: ["number", "null"]

    DashboardSummary:
      type: object
      required: [totalMiles, runCount, nextRewardTier, earnedTiers, recentRuns, pendingRedemptions]
      properties:
        totalMiles:
          type: number
        runCount:
          type: integer
        milesThisMonth:
          type: number
        milesThisWeek:
          type: number
        nextRewardTier:
          oneOf:
            - $ref: '#/components/schemas/RewardTier'
            - type: 'null'
        milesUntilNextReward:
          type: ["number", "null"]
        earnedTiers:
          type: array
          items:
            $ref: '#/components/schemas/RewardTier'
        recentRuns:
          type: array
          items:
            $ref: '#/components/schemas/Run'
        pendingRedemptions:
          type: integer
