        stravaActivityId:
          type: ["string", "null"]
        clubEventId:
          type: ["integer", "null"]

    ClubEvent:
      type: object
      required: [id, name, date, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        date:
          type: string
          format: date
        description:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    ClubEventInput:
      type: object
      required: [name, date]
      properties:
        name:
          type: string
        date:
          type: string
          format: date
        description:
          type: string

    StravaStatus:
      type: object
      required: [connected]
      properties:
        connected:
          type: boolean
        athleteId:
          type: ["string", "null"]
        athleteName:
          type: ["string", "null"]

    StravaSyncResult:
      type: object
      required: [imported]
      properties:
        imported:
          type: integer

    StravaSyncInput:
      type: object
      properties:
        afterDate:
          type: string
          format: date
          description: Only import activities after this date (YYYY-MM-DD)

    StravaWebhookChallenge:
      type: object
      required: ["hub.challenge"]
      properties:
        hub.challenge:
          type: string

    StravaWebhookEvent:
      type: object
      properties:
        object_type:
          type: string
          description: Type of object (e.g. "activity")
        aspect_type:
          type: string
          description: Type of change (e.g. "create", "update", "delete")
        object_id:
          type: integer
          description: The activity or athlete ID
        owner_id:
          type: integer
          description: The Strava athlete ID who owns the object
        subscription_id:
          type: integer
        event_time:
          type: integer
          description: Unix timestamp of the event

    RunInput:
      type: object
      required: [distanceMiles, date]
      properties:
        distanceMiles:
          type: number
          minimum: 0.01
        date:
          type: string
          format: date
        notes:
          type: string
        forUserId:
          type: string
          description: Optional userId of a dependent to log the run for

    RewardTier:
      type: object
      required: [id, name, description, milesRequired, rewardType, active]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        milesRequired:
          type: number
        rewardType:
          type: string
          enum: [coffee, smoothie, apparel, custom]
        active:
          type: boolean

    RewardTierInput:
      type: object
      required: [name, description, milesRequired, rewardType]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        milesRequired:
          type: number
          minimum: 0.1
        rewardType:
          type: string
          enum: [coffee, smoothie, apparel, custom]
        active:
          type: boolean

    RewardTierUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        milesRequired:
          type: number
          minimum: 0.1
        rewardType:
          type: string
          enum: [coffee, smoothie, apparel, custom]
        active:
          type: boolean

    Redemption:
      type: object
      required: [id, userId, rewardTierId, status, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: string
        rewardTierId:
          type: integer
        rewardTierName:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, approved, rejected]
        adminNotes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RedemptionWithMember:
      type: object
      required: [id, userId, rewardTierId, status, createdAt, memberDisplayName]
      properties:
        id:
          type: integer
        userId:
          type: string
        rewardTierId:
          type: integer
        rewardTierName:
          type: ["string", "null"]
        memberDisplayName:
          type: string
        memberEmail:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, approved, rejected]
        adminNotes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RedemptionInput:
      type: object
      required: [rewardTierId]
      properties:
        rewardTierId:
          type: integer
        forUserId:
          type: string
          description: Optional userId of a dependent to request the redemption for

    RedemptionStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [approved, rejected]
        adminNotes:
          type: string

    LeaderboardEntry:
      type: object
      required: [rank, displayName, totalMiles, runCount]
      properties:
        rank:
          type: integer
